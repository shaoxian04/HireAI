spring:
  application:
    name: hireai-backend
  # Optionally load a local, git-ignored backend/.env (KEY=VALUE) so DB_URL etc.
  # resolve from it. "optional:" means startup still works when the file is absent
  # (CI, tests). Integration tests override the datasource via @DynamicPropertySource,
  # so a present .env does not affect them.
  config:
    import: "optional:file:.env[.properties]"
  # The Google OAuth client registration is intentionally NOT declared here. Declaring it with an
  # empty client-id makes Spring's ClientsConfiguredCondition match and then fail validation
  # ("Client id ... must not be empty"), breaking startup whenever no creds are set. Instead it
  # lives in application-oauth.yml, active only under the "oauth" profile. See hireai.auth.oauth2.
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hireai}
    username: ${DB_USERNAME:hireai}
    password: ${DB_PASSWORD:hireai}
  jpa:
    hibernate:
      # Never let Hibernate touch DDL — schema is owned by Flyway migrations.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 5MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        # Bounded listener-side retry; on exhaustion the message dead-letters to the DLQ.
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2.0
          max-interval: 10000
        default-requeue-rejected: false

server:
  port: 8080

logging:
  level:
    root: INFO

hireai:
  # Public base URL the platform advertises to Agents for result callbacks (Plan 4's routing
  # builds callbackUrl = <this> + /api/agent-callbacks/{taskId}/result). Owned here in Plan 2's
  # application.yml; consumed by Plan 4's RoutingAppServiceImpl. Localhost default for the demo.
  platform:
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  dispatch:
    # HMAC secret for short-lived dispatch tokens. MUST be overridden in real deploys.
    token-secret: ${DISPATCH_TOKEN_SECRET:dev-only-dispatch-secret-change-me-32b}
    token-ttl-seconds: ${DISPATCH_TOKEN_TTL_SECONDS:900}
    # Allow http://localhost webhooks only when explicitly enabled (dev/demo). HTTPS is
    # enforced in every other case (Hard Invariant #6).
    allow-insecure-localhost: ${DISPATCH_ALLOW_INSECURE_LOCALHOST:false}
  auth:
    # HS256 signing secret for authentication JWTs. MUST be overridden in real deploys.
    # Dev default is >= 32 bytes (HS256 minimum). Never a real secret in git.
    jwt-secret: ${AUTH_JWT_SECRET:dev-only-auth-jwt-secret-change-me-32bytes!!}
    # Access-token lifetime in seconds (default 24h). Login only; no refresh in this slice.
    jwt-ttl-seconds: ${AUTH_JWT_TTL_SECONDS:86400}
    # Google OAuth login. Disabled by default. To enable: run with the "oauth" Spring profile
    # (SPRING_PROFILES_ACTIVE=oauth) and set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET — that profile
    # (application-oauth.yml) declares the client registration and flips enabled=true, which gates
    # the OAuth security chain + success handler beans.
    oauth2:
      enabled: ${OAUTH2_ENABLED:false}
      success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:http://localhost:3000/auth/callback}
      failure-redirect-url: ${OAUTH2_FAILURE_REDIRECT_URL:http://localhost:3000/login}
  arbitration:
    # Shared secret for the arbitration ruling callback (Hard Invariant #6). MUST be overridden
    # in real deploys. The worker POSTs rulings to /api/arbitration-callbacks/{disputeId}/ruling
    # and authenticates with this secret as a bearer token.
    callback-secret: ${ARBITRATION_CALLBACK_SECRET:dev-only-arbitration-callback-secret-change-me}
    # Human-backstop sweeper: an ARBITRATING dispute older than this is escalated to the admin.
    stale-after: ${ARBITRATION_STALE_AFTER:PT2M}
    sweep-interval: ${ARBITRATION_SWEEP_INTERVAL:PT1M}
  storage:
    # Supabase Storage (public-read bucket; uploads happen ONLY server-side with the service key).
    supabase-url: ${SUPABASE_URL:}
    service-key: ${SUPABASE_SERVICE_KEY:}
    bucket: ${SUPABASE_STORAGE_BUCKET:agent-media}
