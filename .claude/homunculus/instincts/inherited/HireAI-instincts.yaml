# HireAI Workflow Add New Domain Aggregate Vertical Slice

## Action

Follow the add-new-domain-aggregate-vertical-slice workflow:
1. Define enums and value objects in domain model (e.g., enums, OutputSpec, aggregate root).
2. Add domain service(s), event(s), and repository contract.
3. Create database migration for new table.
4. Implement JPA persistence: entity, repository, mapper, implementation.
5. Add application service interfaces and implementations.
6. Define request/response DTOs and converter.
7. Implement controller for API endpoints.
8. Write integration tests for the new aggregate's main flows.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: backend/src/main/java/com/hireai/domain/biz/*/enums/*.java, backend/src/main/java/com/hireai/domain/biz/*/model/*.java, backend/src/main/java/com/hireai/domain/biz/*/event/*.java

